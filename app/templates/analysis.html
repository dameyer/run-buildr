{% extends "base.html" %}

{% block title %}Workout Analysis — Run Builder{% endblock %}

{% block head %}
<style>
  .analysis-layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 1rem;
    max-width: 1300px;
    align-items: start;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }

  .panel-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-4);
    padding: 0.6rem 0.75rem 0.4rem;
    border-bottom: 1px solid var(--border-2);
  }

  #workout-list { max-height: calc(100vh - 140px); overflow-y: auto; padding: 0.3rem 0; }

  .wk-row {
    padding: 0.55rem 0.75rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border-2);
    transition: background 0.1s;
  }
  .wk-row:last-child { border-bottom: none; }
  .wk-row:hover { background: var(--surface-2); }
  .wk-row.active { background: var(--accent-bg); }

  .wk-name { display: block; font-size: 0.85rem; color: var(--text-1); margin-bottom: 0.15rem; }
  .wk-meta { display: block; font-size: 0.72rem; color: var(--text-3); }

  #analysis-panel { padding: 0.75rem; min-height: 200px; }

  .loading, .empty { font-size: 0.82rem; color: var(--text-3); }
  .error { font-size: 0.82rem; color: var(--red); }

  .meta-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
  .meta-name { font-size: 1rem; font-weight: 600; color: var(--text-1); }
  .dev-badge {
    font-size: 0.72rem; padding: 0.15rem 0.5rem; border-radius: 99px;
    border: 1px solid var(--border); color: var(--text-3); background: var(--surface-2);
  }
  .dev-badge.populated { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }

  .raw-bar {
    cursor: pointer;
    font-size: 0.78rem;
    color: var(--text-3);
    font-family: 'Menlo', 'Courier New', monospace;
    margin-bottom: 0.75rem;
    user-select: none;
    transition: color 0.1s;
  }
  .raw-bar:hover { color: var(--text-1); }
  #raw-preview {
    display: none;
    position: relative;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem;
    margin-bottom: 1rem;
    max-height: 400px;
    overflow: auto;
  }
  .raw-actions {
    position: sticky;
    top: 0;
    float: right;
    display: flex;
    gap: 0.4rem;
    margin-left: 0.5rem;
    z-index: 1;
  }
  .raw-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-3);
    font-size: 0.7rem;
    padding: 0.2rem 0.55rem;
    border-radius: 3px;
    cursor: pointer;
  }
  .raw-btn:hover { color: var(--text-1); background: var(--surface-2); }
  #raw-preview pre {
    margin: 0;
    font-family: 'Menlo', 'Courier New', monospace;
    font-size: 0.72rem;
    color: #0f766e;
    white-space: pre;
  }

  .lap-table-wrap { overflow-x: auto; margin-bottom: 1rem; }
  .lap-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; font-family: 'Menlo', monospace; }
  .lap-table th {
    text-align: left; color: var(--text-3); font-weight: normal;
    padding: 0.3rem 0.6rem; border-bottom: 1px solid var(--border);
    text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.05em;
  }
  .lap-table td { padding: 0.3rem 0.6rem; color: var(--text-2); border-bottom: 1px solid var(--border-2); }
  .lap-table tr:last-child td { border-bottom: none; }

  .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }

  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.5rem;
    height: 180px;
  }

  .source-toggle { display: flex; gap: 0; padding: 0.5rem 0.75rem 0; }
  .source-btn {
    flex: 1; background: transparent; border: 1px solid var(--border);
    color: var(--text-3); padding: 0.35rem 0; font-size: 0.75rem; cursor: pointer;
    text-transform: uppercase; letter-spacing: 0.05em; transition: background 0.1s, color 0.1s;
  }
  .source-btn:first-child { border-radius: 3px 0 0 3px; }
  .source-btn:last-child  { border-radius: 0 3px 3px 0; border-left: none; }
  .source-btn:hover { background: var(--surface-2); color: var(--text-1); }
  .source-btn.active { background: var(--accent-bg); color: var(--blue); border-color: var(--accent-border); }

  @media (max-width: 700px) {
    .analysis-layout {
      grid-template-columns: 1fr;
    }
    #workout-list {
      max-height: 200px;
    }
    .charts-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="analysis-layout">

  <div class="panel">
    <div class="source-toggle">
      <button class="source-btn active" id="src-wahoo" onclick="setSource('wahoo')">Wahoo</button>
      <button class="source-btn" id="src-garmin" onclick="setSource('garmin')">Garmin</button>
    </div>
    <div class="panel-label" style="margin-top:0.3rem;">Completed Workouts</div>
    <div id="workout-list"></div>
  </div>

  <div class="panel">
    <div id="analysis-panel">
      <span class="empty">Select a workout to view analysis.</span>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/analysis.js?v={{ cache_buster }}"></script>
{% endblock %}
