{% extends "base.html" %}

{% block head %}
<style>
  .cal-wrap { max-width: 900px; }

  .cal-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .cal-header h2 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-1);
    min-width: 160px;
  }
  .cal-nav {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--text-2);
    padding: 0.3rem 0.7rem;
    border-radius: 4px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .cal-nav:hover { border-color: var(--text-3); color: var(--text-1); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .cal-day-hdr {
    background: var(--surface-2);
    padding: 0.4rem;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-4);
    text-align: center;
  }

  .cal-cell {
    background: var(--surface);
    min-height: 90px;
    padding: 0.4rem;
    vertical-align: top;
  }
  .cal-cell.cal-empty { background: var(--surface-2); }
  .cal-cell.cal-today .cal-day-num {
    background: var(--red);
    color: #fff;
    border-radius: 99px;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cal-day-num {
    font-size: 0.75rem;
    color: var(--text-4);
    margin-bottom: 0.3rem;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cal-chip {
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    color: var(--blue);
    font-size: 0.72rem;
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    margin-bottom: 0.25rem;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cal-chip:hover { background: var(--accent-hover-bg); border-color: var(--accent-hover-border); }
</style>
{% endblock %}

{% block content %}
<div class="cal-wrap">
  <div class="cal-header">
    <button class="cal-nav" id="prev-btn">←</button>
    <h2 id="cal-title"></h2>
    <button class="cal-nav" id="next-btn">→</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let year = new Date().getFullYear();
  let month = new Date().getMonth() + 1;

  async function loadMonth() {
    const resp = await fetch(`/workouts/calendar?year=${year}&month=${month}`);
    const workouts = await resp.json();
    renderCalendar(workouts);
  }

  function renderCalendar(workouts) {
    const dayMap = {};
    for (const w of workouts) {
      if (!w.scheduled_at) continue;
      const d = new Date(w.scheduled_at + (w.scheduled_at.includes('T') ? '' : 'T00:00:00')).getDate();
      if (!dayMap[d]) dayMap[d] = [];
      dayMap[d].push(w);
    }

    document.getElementById('cal-title').textContent =
      new Date(year, month - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';

    for (const label of ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']) {
      const hdr = document.createElement('div');
      hdr.className = 'cal-day-hdr';
      hdr.textContent = label;
      grid.appendChild(hdr);
    }

    const firstDow = new Date(year, month - 1, 1).getDay();
    const daysInMonth = new Date(year, month, 0).getDate();
    const today = new Date();

    for (let i = 0; i < firstDow; i++) {
      const el = document.createElement('div');
      el.className = 'cal-cell cal-empty';
      grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      const isToday = today.getFullYear() === year && today.getMonth() + 1 === month && today.getDate() === d;
      if (isToday) cell.classList.add('cal-today');

      const num = document.createElement('div');
      num.className = 'cal-day-num';
      num.textContent = d;
      cell.appendChild(num);

      for (const w of (dayMap[d] || [])) {
        const chip = document.createElement('div');
        chip.className = 'cal-chip';
        chip.textContent = w.name;
        chip.title = 'Load in editor';
        chip.onclick = () => {
          sessionStorage.setItem('pendingLoad', JSON.stringify(w));
          window.location.href = '/';
        };
        cell.appendChild(chip);
      }

      grid.appendChild(cell);
    }
  }

  document.getElementById('prev-btn').onclick = () => {
    if (--month < 1) { month = 12; year--; }
    loadMonth();
  };
  document.getElementById('next-btn').onclick = () => {
    if (++month > 12) { month = 1; year++; }
    loadMonth();
  };

  loadMonth();
</script>
{% endblock %}
